<!DOCTYPE html>
<html>
<head>
  <title>Voice Legal App</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<h2>🎤 Voice Legal Draft Tool</h2>

<button onclick="startRecognition()">Start</button>
<button onclick="stopRecognition()">Stop</button>

<form method="POST" action="/generate">
  <textarea id="textInput" name="text"></textarea>

  <br><br>

  <select name="format">
    <option value="legal">Legal Format</option>
    <option value="a4">A4 Format</option>
  </select>

  <select name="filetype">
    <option value="word">Word</option>
    <option value="pdf">PDF</option>
  </select>

  <br><br>
  <button type="submit">Download</button>
</form>

<script src="/static/app.js"></script>

</body>
</html>
